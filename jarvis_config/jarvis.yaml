# jarvis_config/jarvis.yaml
# OpenJarvis configuration for GRID Control
# Docs: https://github.com/open-jarvis/OpenJarvis

name: Jarvis
version: "1.0"

brain:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key: "${ANTHROPIC_API_KEY}"
  system_prompt: >
    You are Jarvis, the AI assistant for GRID Control — an autonomous AI marketing OS.
    You help the user manage their brand growth pipeline.
    Answer in 1-3 spoken sentences. No markdown. Sound like JARVIS from Iron Man.

tts:
  provider: edge-tts
  voice: en-US-GuyNeural
  rate: "+5%"

skills_dir: ./jarvis-skills

wake_word: "hey jarvis"
